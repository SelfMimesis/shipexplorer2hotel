<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ShipExplorer Popup Controller</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #111314;
      --panel: #181b1c;
      --deep: #0d1011;
      --cyan: #44e0c0;
      --teal: #1f7d72;
      --muted: #7f9695;
      --amber: #ff7a16;
      --red: #e75a4f;
      --white: #d7e3df;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        linear-gradient(rgba(68, 224, 192, 0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(68, 224, 192, 0.035) 1px, transparent 1px),
        radial-gradient(circle at 50% 0%, rgba(68, 224, 192, 0.08), transparent 42%),
        var(--bg);
      background-size: 28px 28px, 28px 28px, auto;
      color: var(--white);
      font-family: Consolas, "Courier New", monospace;
      padding: 22px;
    }

    main {
      width: min(720px, 100%);
      border: 1px solid var(--teal);
      background: rgba(24, 27, 28, 0.94);
      box-shadow: 0 0 0 1px rgba(68, 224, 192, 0.18), 0 18px 90px rgba(0, 0, 0, 0.5);
      padding: 22px;
    }

    header {
      display: flex;
      gap: 14px;
      align-items: start;
      justify-content: space-between;
      border-bottom: 1px solid rgba(31, 125, 114, 0.6);
      padding-bottom: 16px;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0 0 6px;
      color: var(--cyan);
      font-size: 22px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.5;
    }

    .badge {
      min-width: 148px;
      border: 1px solid var(--teal);
      background: var(--deep);
      color: var(--muted);
      padding: 10px 12px;
      text-align: center;
      font-size: 12px;
      letter-spacing: 0.08em;
    }

    .badge[data-state="CONECTADO"] {
      border-color: var(--cyan);
      color: var(--cyan);
    }

    .badge[data-state="CONECTANDO"] {
      border-color: var(--amber);
      color: var(--amber);
    }

    .badge[data-state="ERROR"] {
      border-color: var(--red);
      color: var(--red);
    }

    label {
      display: block;
      margin: 16px 0 8px;
      color: var(--cyan);
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    input,
    select,
    textarea {
      width: 100%;
      border: 1px solid var(--teal);
      background: var(--deep);
      color: var(--white);
      padding: 12px;
      font: inherit;
      outline: none;
      border-radius: 0;
    }

    textarea {
      min-height: 112px;
      resize: vertical;
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: var(--cyan);
      box-shadow: 0 0 0 2px rgba(68, 224, 192, 0.14);
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .advanced-grid {
      display: grid;
      grid-template-columns: 1.2fr 0.9fr 0.9fr 0.8fr;
      gap: 16px;
      margin-top: 4px;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 18px;
    }

    button {
      min-height: 42px;
      border: 1px solid var(--cyan);
      background: rgba(68, 224, 192, 0.08);
      color: var(--white);
      padding: 10px 14px;
      font: inherit;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      cursor: pointer;
    }

    button:hover {
      border-color: var(--amber);
      color: var(--amber);
      background: rgba(255, 122, 22, 0.12);
    }

    button.danger {
      border-color: var(--red);
    }

    .option {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 10px;
      color: var(--muted);
      font-size: 13px;
    }

    .option input {
      width: auto;
    }

    .note {
      margin-top: 8px;
      color: var(--muted);
      font-size: 12px;
    }

    .meta {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      color: var(--muted);
      font-size: 12px;
      margin-top: 8px;
    }

    .state,
    .logs {
      border: 1px solid rgba(31, 125, 114, 0.7);
      background: rgba(13, 16, 17, 0.72);
      padding: 12px;
      margin-top: 18px;
    }

    .state strong,
    .logs strong {
      color: var(--cyan);
      font-weight: normal;
    }

    .logs {
      min-height: 126px;
      max-height: 190px;
      overflow: auto;
      color: var(--muted);
      font-size: 13px;
    }

    .log-line {
      padding: 3px 0;
      border-bottom: 1px solid rgba(31, 125, 114, 0.2);
    }

    .log-line.error {
      color: var(--red);
    }

    .log-line.ok {
      color: var(--cyan);
    }

    @media (max-width: 680px) {
      header,
      .grid,
      .advanced-grid {
        display: block;
      }

      .badge {
        margin-top: 14px;
      }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <div>
        <h1>ShipExplorer Control</h1>
        <p>Panel remoto para mostrar u ocultar el popup del frontend publico.</p>
      </div>
      <div id="connectionState" class="badge" data-state="DESCONECTADO">DESCONECTADO</div>
    </header>

    <div class="grid">
      <section>
        <label for="token">Token secreto</label>
        <input id="token" type="password" autocomplete="off" placeholder="ADMIN_TOKEN">
        <label class="option">
          <input id="rememberToken" type="checkbox">
          Recordar token en este dispositivo
        </label>
        <p class="note">El token se guarda solo en este dispositivo. Si no marcas la opcion, se conserva solo durante esta sesion.</p>
      </section>

      <section>
        <label for="message">Mensaje del popup</label>
        <textarea id="message" maxlength="240" placeholder="Texto visible en ShipExplorer"></textarea>
        <div class="meta">
          <span id="counter">0 / 240</span>
          <span id="socketUrl">WS</span>
        </div>
      </section>
    </div>

    <div class="advanced-grid">
      <section>
        <label for="title">Titulo</label>
        <input id="title" type="text" maxlength="80" placeholder="Aviso">
      </section>

      <section>
        <label for="variant">Variante</label>
        <select id="variant">
          <option value="info">INFO</option>
          <option value="warning">WARNING</option>
          <option value="danger">DANGER</option>
          <option value="success">SUCCESS</option>
        </select>
      </section>

      <section>
        <label for="durationMs">Duracion ms</label>
        <input id="durationMs" type="number" min="0" step="100" value="0">
      </section>

      <section>
        <label>&nbsp;</label>
        <label class="option">
          <input id="dismissible" type="checkbox" checked>
          Dismissible
        </label>
      </section>
    </div>

    <div class="controls">
      <button id="showButton" type="button">MOSTRAR POPUP</button>
      <button id="hideButton" class="danger" type="button">OCULTAR POPUP</button>
      <button id="testButton" type="button">ENVIAR TEST</button>
    </div>

    <section id="popupState" class="state">
      <strong>POPUP</strong> estado no recibido.
    </section>

    <section class="logs" aria-live="polite">
      <strong>LOGS</strong>
      <div id="logs"></div>
    </section>
  </main>

  <script>
    const STORAGE_KEYS = {
      token: "shipexplorer.popup.token",
      rememberToken: "shipexplorer.popup.rememberToken",
      message: "shipexplorer.popup.lastMessage",
      title: "shipexplorer.popup.title",
      variant: "shipexplorer.popup.variant",
      durationMs: "shipexplorer.popup.durationMs",
      dismissible: "shipexplorer.popup.dismissible"
    };

    const connectionState = document.querySelector("#connectionState");
    const tokenInput = document.querySelector("#token");
    const rememberTokenInput = document.querySelector("#rememberToken");
    const messageInput = document.querySelector("#message");
    const titleInput = document.querySelector("#title");
    const variantInput = document.querySelector("#variant");
    const durationInput = document.querySelector("#durationMs");
    const dismissibleInput = document.querySelector("#dismissible");
    const counter = document.querySelector("#counter");
    const socketUrl = document.querySelector("#socketUrl");
    const showButton = document.querySelector("#showButton");
    const hideButton = document.querySelector("#hideButton");
    const testButton = document.querySelector("#testButton");
    const popupState = document.querySelector("#popupState");
    const logs = document.querySelector("#logs");

    const RENDER_WS_URL = "wss://shipexplorer2.onrender.com/ws";
    const protocol = location.protocol === "https:" ? "wss" : "ws";
    const sameHostWsUrl = protocol + "://" + location.host + "/ws";
    const querySocketUrl = new URLSearchParams(location.search).get("socketUrl");
    const wsUrl = querySocketUrl || (location.hostname.endsWith(".github.io") ? RENDER_WS_URL : sameHostWsUrl);

    let socket = null;
    let reconnectTimer = 0;
    let reconnectAttempt = 0;
    let manualClose = false;

    socketUrl.textContent = wsUrl;
    restoreForm();
    connect();

    function connect() {
      clearTimeout(reconnectTimer);
      manualClose = false;
      setConnectionState("CONECTANDO");

      if (socket && socket.readyState !== WebSocket.CLOSED) {
        manualClose = true;
        socket.close();
        manualClose = false;
      }

      socket = new WebSocket(wsUrl);

      socket.addEventListener("open", () => {
        reconnectAttempt = 0;
        setConnectionState("CONECTADO");
        addLog("conectado", "ok");
      });

      socket.addEventListener("close", () => {
        setConnectionState("DESCONECTADO");
        if (!manualClose) scheduleReconnect();
      });

      socket.addEventListener("error", () => {
        setConnectionState("ERROR");
        addLog("error de conexion", "error");
      });

      socket.addEventListener("message", (event) => {
        handleSocketMessage(event.data);
      });
    }

    function scheduleReconnect() {
      reconnectAttempt += 1;
      const delay = Math.min(10000, 900 + reconnectAttempt * 700);
      addLog("reconectando en " + Math.round(delay / 1000) + "s");
      reconnectTimer = window.setTimeout(connect, delay);
    }

    function handleSocketMessage(raw) {
      let data;
      try {
        data = JSON.parse(raw);
      } catch {
        addLog("mensaje mal formado del servidor", "error");
        return;
      }

      if (data.type === "popup:update") {
        renderPopupState(data);
        addLog("popup actualizado", "ok");
        return;
      }

      if (data.type === "error") {
        const message = data.message || "error del servidor";
        addLog(message.toLowerCase().includes("token") ? "error token invalido" : message, "error");
        setConnectionState("ERROR");
      }
    }

    function sendCommand(command) {
      if (!socket || socket.readyState !== WebSocket.OPEN) {
        addLog("no conectado", "error");
        setConnectionState("DESCONECTADO");
        scheduleReconnect();
        return;
      }

      socket.send(JSON.stringify(command));
      addLog("comando enviado", "ok");
    }

    function showPopup(messageOverride) {
      const token = tokenInput.value.trim();
      const message = String(messageOverride || messageInput.value).trim();
      const title = titleInput.value.trim();
      const variant = variantInput.value;
      const durationMs = parseDurationMs(durationInput.value);
      const dismissible = dismissibleInput.checked;

      saveTokenPreference();
      saveLastMessage();
      savePopupOptions();

      if (!token) {
        addLog("token requerido", "error");
        return;
      }

      if (!message) {
        addLog("mensaje requerido", "error");
        return;
      }

      sendCommand({
        type: "popup:show",
        token,
        message,
        title,
        variant,
        durationMs,
        dismissible
      });
    }

    function hidePopup() {
      const token = tokenInput.value.trim();
      saveTokenPreference();

      if (!token) {
        addLog("token requerido", "error");
        return;
      }

      sendCommand({
        type: "popup:hide",
        token
      });
    }

    function sendTest() {
      const testMessage = "SHIP POPUP TEST " + new Date().toLocaleTimeString();
      messageInput.value = testMessage;
      titleInput.value = "Aviso";
      variantInput.value = "info";
      durationInput.value = "5000";
      dismissibleInput.checked = true;
      updateCounter();
      localStorage.setItem(STORAGE_KEYS.message, testMessage);
      savePopupOptions();
      showPopup(testMessage);
    }

    function renderPopupState(state) {
      const visible = Boolean(state.popupVisible);
      popupState.innerHTML =
        "<strong>VISIBLE</strong> " + escapeHtml(visible ? "SI" : "NO") +
        "<br><strong>TITULO</strong> " + escapeHtml(state.title || "") +
        "<br><strong>VARIANTE</strong> " + escapeHtml(state.variant || "info") +
        "<br><strong>DURACION</strong> " + escapeHtml(String(state.durationMs || 0)) +
        "<br><strong>DISMISSIBLE</strong> " + escapeHtml(state.dismissible === false ? "NO" : "SI") +
        "<br><strong>MENSAJE</strong> " + escapeHtml(state.popupMessage || "") +
        "<br><strong>ACTUALIZADO</strong> " + escapeHtml(state.updatedAt || "");
    }

    function setConnectionState(state) {
      connectionState.textContent = state;
      connectionState.dataset.state = state;
    }

    function addLog(message, kind) {
      const line = document.createElement("div");
      line.className = "log-line" + (kind ? " " + kind : "");
      line.textContent = "[" + new Date().toLocaleTimeString() + "] " + message;
      logs.prepend(line);

      while (logs.children.length > 30) {
        logs.lastElementChild.remove();
      }
    }

    function updateCounter() {
      counter.textContent = messageInput.value.length + " / 240";
    }

    function restoreForm() {
      rememberTokenInput.checked = localStorage.getItem(STORAGE_KEYS.rememberToken) === "true";

      if (rememberTokenInput.checked) {
        tokenInput.value = localStorage.getItem(STORAGE_KEYS.token) || "";
      } else {
        tokenInput.value = sessionStorage.getItem(STORAGE_KEYS.token) || "";
      }

      messageInput.value = localStorage.getItem(STORAGE_KEYS.message) || "";
      titleInput.value = localStorage.getItem(STORAGE_KEYS.title) || "";
      variantInput.value = localStorage.getItem(STORAGE_KEYS.variant) || "info";
      durationInput.value = localStorage.getItem(STORAGE_KEYS.durationMs) || "0";
      dismissibleInput.checked = localStorage.getItem(STORAGE_KEYS.dismissible) !== "false";
      updateCounter();
    }

    function saveTokenPreference() {
      if (rememberTokenInput.checked) {
        localStorage.setItem(STORAGE_KEYS.rememberToken, "true");
        localStorage.setItem(STORAGE_KEYS.token, tokenInput.value);
        sessionStorage.removeItem(STORAGE_KEYS.token);
      } else {
        localStorage.setItem(STORAGE_KEYS.rememberToken, "false");
        localStorage.removeItem(STORAGE_KEYS.token);
        sessionStorage.setItem(STORAGE_KEYS.token, tokenInput.value);
      }
    }

    function saveLastMessage() {
      localStorage.setItem(STORAGE_KEYS.message, messageInput.value);
    }

    function savePopupOptions() {
      localStorage.setItem(STORAGE_KEYS.title, titleInput.value);
      localStorage.setItem(STORAGE_KEYS.variant, variantInput.value);
      localStorage.setItem(STORAGE_KEYS.durationMs, String(parseDurationMs(durationInput.value)));
      localStorage.setItem(STORAGE_KEYS.dismissible, String(dismissibleInput.checked));
    }

    function parseDurationMs(value) {
      const parsed = Number.parseInt(value, 10);
      if (!Number.isFinite(parsed) || parsed < 0) return 0;
      return Math.min(parsed, 2147483647);
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    rememberTokenInput.addEventListener("change", saveTokenPreference);
    tokenInput.addEventListener("input", saveTokenPreference);
    messageInput.addEventListener("input", () => {
      updateCounter();
      saveLastMessage();
    });
    titleInput.addEventListener("input", savePopupOptions);
    variantInput.addEventListener("change", savePopupOptions);
    durationInput.addEventListener("input", savePopupOptions);
    dismissibleInput.addEventListener("change", savePopupOptions);

    showButton.addEventListener("click", () => showPopup());
    hideButton.addEventListener("click", hidePopup);
    testButton.addEventListener("click", sendTest);

    window.addEventListener("beforeunload", () => {
      manualClose = true;
      if (socket) socket.close();
    });
  </script>
</body>
</html>
